name: Image Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image and run smoke tests
        run: |
          RELEASE_TAG="ci-${GITHUB_RUN_ID}" \
          make build-release RUN_POST_BUILD_TESTS=true
